server {
    listen 80;

    # Serve React build (admin panel + auth screens)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Socket.IO to backend
    location /socket.io/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Proxy all /api/* to backend
    location /api/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # Proxy dashboard HTML (served by FastAPI/Jinja2)
    location /dashboard {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # Proxy /status (used by dashboard health check)
    location /status {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }
}
